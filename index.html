<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .search-box { width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #ddd; margin-bottom: 30px; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .link-card { background: white; padding: 20px; border-radius: 12px; text-decoration: none; color: #333; text-align: center; font-weight: bold; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .link-card:hover { transform: translateY(-5px); background: #007aff; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <form action="https://www.google.com/search" method="GET">
            <input type="text" name="q" class="search-box" placeholder="Google 검색...">
        </form>
        <div class="grid">
            <a href="https://github.com" class="link-card">GitHub</a>
            <a href="https://youtube.com" class="link-card">YouTube</a>
            <a href="https://discord.com" class="link-card">Discord</a>
            <a href="#" class="link-card">School Portal</a>
        </div>
    </div>
</body>
</html>
