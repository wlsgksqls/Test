<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>고등학교 시간표</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <div class="header">
    <h1>📚 고등학교 시간표</h1>
    <p>나이스 교육정보 API 기반</p>
  </div>

  <div class="card">

    <label>지역</label>

    <select id="region">
      <option value="B10">서울</option>
      <option value="C10">부산</option>
      <option value="D10">대구</option>
      <option value="E10">인천</option>
      <option value="F10">광주</option>
      <option value="G10">대전</option>
      <option value="H10">울산</option>
      <option value="I10">세종</option>
      <option value="J10">경기</option>
      <option value="K10">강원</option>
      <option value="M10">충북</option>
      <option value="N10">충남</option>
      <option value="P10">전북</option>
      <option value="Q10">전남</option>
      <option value="R10">경북</option>
      <option value="S10">경남</option>
      <option value="T10">제주</option>
    </select>

    <label>학교명</label>

    <div class="row">
      <input
        type="text"
        id="schoolName"
        placeholder="학교명을 입력하세요"
      />

      <button onclick="searchSchool()">
        검색
      </button>
    </div>

    <label>학교 선택</label>

    <select id="schoolSelect"></select>

    <div class="grid">

      <div>
        <label>학년</label>

        <input
          type="number"
          id="grade"
          placeholder="1"
        />
      </div>

      <div>
        <label>반</label>

        <input
          type="number"
          id="classNm"
          placeholder="1"
        />
      </div>

    </div>

    <label>날짜</label>

    <input type="date" id="date" />

    <button class="primary" onclick="loadTimetable()">
      시간표 조회
    </button>

  </div>

  <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
